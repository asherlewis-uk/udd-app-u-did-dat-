name: Deploy

on:
  push:
    branches:
      - main # → dev
      - release/* # → staging + prod (with manual gate)

env:
  REGISTRY: us-central1-docker.pkg.dev
  GCP_REGION: us-central1
  SERVICES: ai-orchestration worker-manager orchestrator api gateway usage-meter collaboration
  JOBS: session-reaper

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CI_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Export image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push all service images
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.sha }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          for svc in $SERVICES $JOBS; do
            IMAGE="${REGISTRY}/${GCP_PROJECT_ID}/udd-images/${svc}:${IMAGE_TAG}"
            docker buildx build \
              --platform linux/amd64 \
              --file "apps/${svc}/Dockerfile" \
              --tag "${IMAGE}" \
              --push \
              .
          done

  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CI_SERVICE_ACCOUNT }}

      - name: Deploy services to Cloud Run (dev)
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          NAME_PREFIX: udd-dev
        run: |
          for svc in $SERVICES; do
            IMAGE="${REGISTRY}/${GCP_PROJECT_ID}/udd-images/${svc}:${IMAGE_TAG}"
            gcloud run deploy "${NAME_PREFIX}-${svc}" \
              --image "${IMAGE}" \
              --region "${GCP_REGION}" \
              --project "${GCP_PROJECT_ID}" \
              --platform managed \
              --quiet
          done

      - name: Deploy jobs to Cloud Run
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          NAME_PREFIX: udd-dev
        run: |
          for job in $JOBS; do
            IMAGE="${REGISTRY}/${GCP_PROJECT_ID}/udd-images/${job}:${IMAGE_TAG}"
            gcloud run jobs deploy "${NAME_PREFIX}-${job}" \
              --image "${IMAGE}" \
              --region "${GCP_REGION}" \
              --project "${GCP_PROJECT_ID}" \
              --quiet
          done

  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-dev]
    if: startsWith(github.ref, 'refs/heads/release/')
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CI_SERVICE_ACCOUNT }}

      - name: Deploy services to Cloud Run (staging)
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          NAME_PREFIX: udd-staging
        run: |
          for svc in $SERVICES; do
            IMAGE="${REGISTRY}/${GCP_PROJECT_ID}/udd-images/${svc}:${IMAGE_TAG}"
            gcloud run deploy "${NAME_PREFIX}-${svc}" \
              --image "${IMAGE}" \
              --region "${GCP_REGION}" \
              --project "${GCP_PROJECT_ID}" \
              --platform managed \
              --quiet
          done

      - name: Deploy jobs to Cloud Run
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          NAME_PREFIX: udd-staging
        run: |
          for job in $JOBS; do
            IMAGE="${REGISTRY}/${GCP_PROJECT_ID}/udd-images/${job}:${IMAGE_TAG}"
            gcloud run jobs deploy "${NAME_PREFIX}-${job}" \
              --image "${IMAGE}" \
              --region "${GCP_REGION}" \
              --project "${GCP_PROJECT_ID}" \
              --quiet
          done

  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: startsWith(github.ref, 'refs/heads/release/')
    environment: prod # has manual approval gate configured in GitHub
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CI_SERVICE_ACCOUNT }}

      - name: Deploy services to Cloud Run (prod)
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          NAME_PREFIX: udd-prod
        run: |
          for svc in $SERVICES; do
            IMAGE="${REGISTRY}/${GCP_PROJECT_ID}/udd-images/${svc}:${IMAGE_TAG}"
            gcloud run deploy "${NAME_PREFIX}-${svc}" \
              --image "${IMAGE}" \
              --region "${GCP_REGION}" \
              --project "${GCP_PROJECT_ID}" \
              --platform managed \
              --quiet
          done

      - name: Deploy jobs to Cloud Run
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          NAME_PREFIX: udd-prod
        run: |
          for job in $JOBS; do
            IMAGE="${REGISTRY}/${GCP_PROJECT_ID}/udd-images/${job}:${IMAGE_TAG}"
            gcloud run jobs deploy "${NAME_PREFIX}-${job}" \
              --image "${IMAGE}" \
              --region "${GCP_REGION}" \
              --project "${GCP_PROJECT_ID}" \
              --quiet
          done
