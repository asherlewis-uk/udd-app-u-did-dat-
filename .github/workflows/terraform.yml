name: Terraform Validate + Plan

on:
  pull_request:
    paths:
      - 'infra/terraform/**'

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.0' }

      - name: Terraform Init (${{ matrix.environment }})
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform init -backend=false

      - name: Terraform Validate (${{ matrix.environment }})
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Plan (${{ matrix.environment }})
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_db_username: "uddadmin"
          TF_VAR_db_password: "placeholder-for-plan"
        run: terraform plan -no-color
        continue-on-error: true
