name: Terraform Validate + Plan

on:
  pull_request:
    paths:
      - 'infra/terraform/**'

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        environment: [dev, staging, prod]

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CI_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.0' }

      - name: Terraform Init (${{ matrix.environment }})
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform Validate (${{ matrix.environment }})
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Plan (${{ matrix.environment }})
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_db_username: "uddadmin"
          TF_VAR_db_password: "placeholder-for-plan"
          TF_VAR_pusher_app_id: ${{ secrets.PUSHER_APP_ID }}
          TF_VAR_pusher_key: ${{ secrets.PUSHER_KEY }}
          TF_VAR_pusher_secret: ${{ secrets.PUSHER_SECRET }}
          TF_VAR_pusher_cluster: ${{ secrets.PUSHER_CLUSTER }}
        run: terraform plan -no-color
        continue-on-error: true
